<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Sidekick for Substitute Teachers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    select, textarea, input[type="radio"] {
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
    #sidekick-output {
      background: #f5f5f5;
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 30px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>🧠 AI Sidekick for Substitute Teachers</h1>
  <p>Generate a class plan in seconds. Just fill in the details below:</p>

  <form id="sidekick-form">
    <label>Grade Level:
      <select name="grade" required>
        <option value="">Select grade</option>
        <option>6</option><option>7</option><option>8</option>
        <option>9</option><option>10</option><option>11</option><option>12</option>
      </select>
    </label>

    <label>Subject:
      <select name="subject" required>
        <option value="">Select subject</option>
        <option>English/Language Arts</option>
        <option>Math</option>
        <option>Science</option>
        <option>Social Studies</option>
        <option>Other</option>
      </select>
    </label>

    <label>Is work provided?<br>
      <input type="radio" name="hasWork" value="Yes" required> Yes
      <input type="radio" name="hasWork" value="No" required> No
    </label>

    <label>Behavior Level:
      <select name="behavior" required>
        <option value="">Select behavior level</option>
        <option>Calm</option>
        <option>Typical</option>
        <option>Rowdy</option>
      </select>
    </label>

    <label>Additional Notes:
      <textarea name="notes" rows="4" cols="40" placeholder="e.g., It's the last week of school. Short periods."></textarea>
    </label>

    <button type="submit">Generate Class Plan</button>
  </form>

  <div id="sidekick-output"></div>

  <script>
    document.getElementById('sidekick-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const form = e.target;
      const data = {
        grade: form.grade.value,
        subject: form.subject.value,
        hasWork: form.hasWork.value,
        behavior: form.behavior.value,
        notes: form.notes.value || ""
      };

      document.getElementById('sidekick-output').innerHTML = "⏳ Generating class plan...";

      try {
        const response = await fetch('/.netlify/functions/sidekick', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.reply) {
          document.getElementById('sidekick-output').innerHTML =
            `<pre>${result.reply}</pre>`;
        } else {
          throw new Error("No reply received from AI.");
        }
      } catch (err) {
        console.error("Error:", err);
        document.getElementById('sidekick-output').innerHTML =
          "❌ Something went wrong. Please try again or check the console for details.";
      }
    });
  </script>

</body>
</html>
